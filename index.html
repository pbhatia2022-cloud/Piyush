<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:30px;
}

.container{
    width:100%;
    max-width:550px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    margin-bottom:25px;
    color:#333;
}

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#444;
}

input, textarea, select{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

textarea{
    resize:vertical;
    min-height:90px;
}

.phone-row{
    display:flex;
    gap:10px;
}

.phone-row select{
    width:35%;
}

.phone-row input{
    width:65%;
}

button{
    width:100%;
    background:#007BFF;
    color:white;
    border:none;
    padding:14px;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#0056b3;
}

#status{
    margin-top:20px;
    text-align:center;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="container">

<h2>Student Registration Form</h2>

<form id="studentForm">

<div class="form-group">
<label>Student Name</label>
<input
type="text"
id="name"
required
placeholder="Enter full name">
</div>

<div class="form-group">
<label>Date of Birth</label>
<input
type="date"
id="dob"
required>
</div>

<div class="form-group">
<label>Address</label>
<textarea
id="address"
required
placeholder="Enter full address"></textarea>
</div>

<div class="form-group">

<label>Phone Number</label>

<div class="phone-row">

<select id="countryCode">

<option value="+91" selected>🇮🇳 India (+91)</option>
<option value="+1">🇺🇸 USA (+1)</option>
<option value="+44">🇬🇧 UK (+44)</option>
<option value="+61">🇦🇺 Australia (+61)</option>
<option value="+971">🇦🇪 UAE (+971)</option>
<option value="+65">🇸🇬 Singapore (+65)</option>
<option value="+81">🇯🇵 Japan (+81)</option>
<option value="+49">🇩🇪 Germany (+49)</option>
<option value="+33">🇫🇷 France (+33)</option>
<option value="+86">🇨🇳 China (+86)</option>

</select>

<input
type="tel"
id="phone"
required
placeholder="9876543210">

</div>

</div>

<button type="submit">
Submit
</button>

</form>

<div id="status"></div>

</div>

<script>

const webhookUrl = "https://piyush.ifsjaipur.cloud/app/form";

document.getElementById("studentForm").addEventListener("submit", async function(e){

e.preventDefault();

const data = {

name: document.getElementById("name").value,

dateOfBirth: document.getElementById("dob").value,

address: document.getElementById("address").value,

countryCode: document.getElementById("countryCode").value,

phoneNumber: document.getElementById("phone").value,

fullPhoneNumber:
document.getElementById("countryCode").value +
document.getElementById("phone").value

};

const status = document.getElementById("status");

status.style.color="black";
status.innerHTML="Submitting...";

try{

const response = await fetch(webhookUrl,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
});

if(response.ok){

status.style.color="green";
status.innerHTML="✅ Form submitted successfully.";

document.getElementById("studentForm").reset();

document.getElementById("countryCode").value="+91";

}
else{

status.style.color="red";
status.innerHTML="❌ Submission failed.";

}

}catch(err){

status.style.color="red";
status.innerHTML="❌ Could not connect to server.";

}

});

</script>

</body>
</html>
